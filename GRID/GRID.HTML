<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <link rel="stylesheet" type="text/css" href="STYLE.CSS" />
  <!-- LINKS CSS TO HTML FILE -->

  <title>Image Grid</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      background-color: #f5f5f5;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .grid-item {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      border-radius: 8px;
      transition: transform 0.2s ease;
    }

    .grid-item:hover {
      transform: scale(1.03);
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>
<body>
<!-- BODY IS THE MAIN BOX. -->
  <div class="grid-container">
    <a href="link1.html" class="grid-item">
      <img src="https://via.placeholder.com/400" alt="Image 1" />
    </a>
    <a href="link2.html" class="grid-item">
      <img src="https://via.placeholder.com/400" alt="Image 2" />
    </a>
    <a href="link3.html" class="grid-item">
      <img src="https://via.placeholder.com/400" alt="Image 3" />
    </a>



    <!-- THIS OPENS THE LINK IN A NEW TAB -->
    <a href="https://example.com" target="_blank" rel="noopener noreferrer">
    <!-- THIS MASKS THE LINK AS AN IMAGE -->
      <img src="../IMAGES/4.jpg" alt="DESCRIBESTHEFILESFORBLINDPEOPLE" class="responsive-image" />
    </a>
    
    <!-- <link rel="stylesheet" type="text/css" href="styles.css" /> -->
  </div>

</body>
</html>
